name: API Tests

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'package*.json'
      - 'yarn.lock'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'package*.json'
      - 'yarn.lock'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm test
        env:
          NODE_ENV: test
          USE_IN_MEMORY_DB: 'true'
          USE_MOCK_SERVICES: 'true'

