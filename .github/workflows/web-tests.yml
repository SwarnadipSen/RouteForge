name: Web Tests

on:
  push:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'package*.json'
      - 'yarn.lock'
  pull_request:
    branches: [master]
    paths:
      - 'apps/web/**'
      - 'package*.json'
      - 'yarn.lock'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run web tests
        run: yarn test
        env:
          NODE_ENV: test

